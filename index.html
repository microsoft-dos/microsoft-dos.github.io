<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>贪吃蛇 🐍</title>
    <style>
        /* ========== 全局样式 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', system-ui, sans-serif;
            user-select: none;
        }

        .container {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            padding: 30px 35px 40px;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: 0.3s;
        }

        h1 {
            color: #fff;
            font-weight: 600;
            font-size: 28px;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }
        h1 span {
            color: #facc15;
        }

        .score-wrap {
            color: rgba(255, 255, 255, 0.7);
            font-size: 18px;
            margin-bottom: 18px;
            display: flex;
            justify-content: center;
            gap: 40px;
        }
        .score-wrap span {
            color: #fff;
            font-weight: 700;
            font-size: 22px;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 18px;
            background: #1e1e2f;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06), 0 12px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            height: auto;
            aspect-ratio: 1 / 1;
            touch-action: none;
        }

        .controls {
            margin-top: 22px;
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        button {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            padding: 10px 28px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.25s;
            backdrop-filter: blur(4px);
            letter-spacing: 0.5px;
        }
        button:hover {
            background: #facc15;
            color: #1e1e2f;
            border-color: #facc15;
            transform: scale(1.04);
            box-shadow: 0 6px 20px rgba(250, 204, 21, 0.3);
        }
        button:active {
            transform: scale(0.96);
        }

        .hint {
            color: rgba(255, 255, 255, 0.3);
            font-size: 13px;
            margin-top: 16px;
            letter-spacing: 0.3px;
        }

        .hint kbd {
            background: rgba(255, 255, 255, 0.08);
            padding: 2px 10px;
            border-radius: 6px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        /* ========== 移动端触控方向键 ========== */
        .touch-dpad {
            display: none;
            margin-top: 20px;
            justify-content: center;
            gap: 6px;
        }
        .touch-dpad .row {
            display: flex;
            gap: 6px;
        }
        .touch-dpad button {
            width: 64px;
            height: 64px;
            font-size: 26px;
            padding: 0;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .touch-dpad button:active {
            background: #facc15;
            color: #1e1e2f;
        }

        @media (pointer: coarse) {
            .touch-dpad {
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            .hint kbd {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🐍 <span>贪吃蛇</span></h1>

        <div class="score-wrap">
            <div>🏆 得分 <span id="score">0</span></div>
            <div>📏 长度 <span id="length">3</span></div>
        </div>

        <!-- 游戏画布 -->
        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="controls">
            <button id="restartBtn">🔄 重新开始</button>
        </div>

        <!-- 移动端方向键 -->
        <div class="touch-dpad" id="touchDpad">
            <div class="row">
                <button data-dir="up">⬆</button>
            </div>
            <div class="row">
                <button data-dir="left">⬅</button>
                <button data-dir="down">⬇</button>
                <button data-dir="right">➡</button>
            </div>
        </div>

        <div class="hint">
            <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 或 <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 控制方向
        </div>
    </div>

    <script>
        // ============================================================
        //  贪吃蛇 —— 核心逻辑
        // ============================================================

        // ---------- DOM 引用 ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const lengthEl = document.getElementById('length');

        // ---------- 游戏配置 ----------
        const GRID_SIZE = 20; // 20x20 网格
        const CELL_SIZE = canvas.width / GRID_SIZE;

        // ---------- 游戏状态 ----------
        let snake = []; // 坐标数组 [x,y]
        let food = { x: 8, y: 10 };
        let direction = 'right'; // 当前移动方向
        let nextDirection = 'right';
        let score = 0;
        let gameOver = false;
        let winFlag = false;
        let gameInterval = null;
        const MOVE_INTERVAL_MS = 150;

        // ---------- 初始化 / 重置 ----------
        function initGame() {
            // 蛇：初始长度 3，水平放置
            snake = [
                [8, 10],
                [7, 10],
                [6, 10]
            ];
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            gameOver = false;
            winFlag = false;
            updateScoreUI();
            generateFood();
            clearInterval(gameInterval);
            gameInterval = setInterval(gameTick, MOVE_INTERVAL_MS);
            drawCanvas();
        }

        // ---------- 生成食物（避开蛇身） ----------
        function generateFood() {
            const totalCells = GRID_SIZE * GRID_SIZE;
            if (snake.length >= totalCells) {
                // 胜利：所有格子被蛇占满
                winFlag = true;
                gameOver = true;
                clearInterval(gameInterval);
                drawCanvas();
                return;
            }

            const snakeSet = new Set(snake.map(cell => `${cell[0]},${cell[1]}`));
            const free = [];
            for (let i = 0; i < GRID_SIZE; i++) {
                for (let j = 0; j < GRID_SIZE; j++) {
                    if (!snakeSet.has(`${i},${j}`)) free.push([i, j]);
                }
            }
            if (free.length === 0) {
                winFlag = true;
                gameOver = true;
                clearInterval(gameInterval);
                drawCanvas();
                return;
            }
            const pos = free[Math.floor(Math.random() * free.length)];
            food = { x: pos[0], y: pos[1] };
        }

        // ---------- 更新 UI 分数 ----------
        function updateScoreUI() {
            scoreEl.textContent = score;
            lengthEl.textContent = snake.length;
        }

        // ---------- 游戏时钟 Tick ----------
        function gameTick() {
            if (gameOver) return;

            // 生效下一个有效方向
            const opposite = {
                'up': 'down',
                'down': 'up',
                'left': 'right',
                'right': 'left'
            };
            if (nextDirection && opposite[nextDirection] !== direction) {
                direction = nextDirection;
            }

            // 计算新蛇头
            const head = snake[0];
            let newHeadX = head[0];
            let newHeadY = head[1];
            switch (direction) {
                case 'right':
                    newHeadX++;
                    break;
                case 'left':
                    newHeadX--;
                    break;
                case 'up':
                    newHeadY--;
                    break;
                case 'down':
                    newHeadY++;
                    break;
                default:
                    break;
            }

            // 检测是否吃到食物
            const isEating = (newHeadX === food.x && newHeadY === food.y);

            // 构建新蛇
            let newSnake = [
                [newHeadX, newHeadY],
                ...snake
            ];
            if (!isEating) {
                newSnake.pop(); // 没吃到 -> 移除尾部
            }

            // ---- 碰撞检测 ----
            // 1) 墙壁碰撞
            if (newHeadX < 0 || newHeadX >= GRID_SIZE || newHeadY < 0 || newHeadY >= GRID_SIZE) {
                endGame();
                return;
            }
            // 2) 自身碰撞（新蛇头是否与身体其他部分重叠）
            const headStr = `${newHeadX},${newHeadY}`;
            // 从索引 1 开始检查（忽略蛇头自己）
            for (let i = 1; i < newSnake.length; i++) {
                if (`${newSnake[i][0]},${newSnake[i][1]}` === headStr) {
                    endGame();
                    return;
                }
            }

            // ---- 更新状态 ----
            snake = newSnake;
            if (isEating) {
                score++;
                updateScoreUI();
                generateFood(); // 可能触发胜利
                if (gameOver) {
                    drawCanvas();
                    return;
                }
            }
            updateScoreUI();
            drawCanvas();
        }

        // ---------- 结束游戏 ----------
        function endGame() {
            if (gameOver) return;
            gameOver = true;
            clearInterval(gameInterval);
            drawCanvas();
        }

        // ---------- 绘图 ----------
        function drawCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制网格线（极淡）
            ctx.strokeStyle = 'rgba(255,255,255,0.035)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }

            // 绘制食物
            ctx.shadowColor = '#facc15';
            ctx.shadowBlur = 18;
            ctx.fillStyle = '#facc15';
            ctx.beginPath();
            ctx.arc(
                food.x * CELL_SIZE + CELL_SIZE / 2,
                food.y * CELL_SIZE + CELL_SIZE / 2,
                CELL_SIZE / 2 - 2,
                0,
                2 * Math.PI
            );
            ctx.fill();
            ctx.shadowBlur = 0;

            // 绘制蛇
            for (let i = 0; i < snake.length; i++) {
                const [x, y] = snake[i];
                const gradient = ctx.createRadialGradient(
                    x * CELL_SIZE + 4, y * CELL_SIZE + 4, 2,
                    x * CELL_SIZE + CELL_SIZE / 2, y * CELL_SIZE + CELL_SIZE / 2, CELL_SIZE / 1.8
                );
                if (i === 0) {
                    gradient.addColorStop(0, '#a3e635');
                    gradient.addColorStop(1, '#65a30d');
                } else {
                    gradient.addColorStop(0, '#4ade80');
                    gradient.addColorStop(1, '#15803d');
                }
                ctx.fillStyle = gradient;
                ctx.shadowColor = i === 0 ? 'rgba(163,230,53,0.4)' : 'rgba(74,222,128,0.2)';
                ctx.shadowBlur = i === 0 ? 16 : 8;
                ctx.beginPath();
                ctx.roundRect(x * CELL_SIZE + 1.5, y * CELL_SIZE + 1.5, CELL_SIZE - 3, CELL_SIZE - 3, 5);
                ctx.fill();
            }
            ctx.shadowBlur = 0;

            // 绘制眼睛（蛇头）
            if (snake.length > 0 && !gameOver) {
                const [hx, hy] = snake[0];
                const cx = hx * CELL_SIZE + CELL_SIZE / 2;
                const cy = hy * CELL_SIZE + CELL_SIZE / 2;
                const offset = 5;
                let ex1, ey1, ex2, ey2;
                switch (direction) {
                    case 'right':
                        ex1 = cx + 3;
                        ey1 = cy - 4;
                        ex2 = cx + 3;
                        ey2 = cy + 4;
                        break;
                    case 'left':
                        ex1 = cx - 3;
                        ey1 = cy - 4;
                        ex2 = cx - 3;
                        ey2 = cy + 4;
                        break;
                    case 'up':
                        ex1 = cx - 4;
                        ey1 = cy - 3;
                        ex2 = cx + 4;
                        ey2 = cy - 3;
                        break;
                    case 'down':
                        ex1 = cx - 4;
                        ey1 = cy + 3;
                        ex2 = cx + 4;
                        ey2 = cy + 3;
                        break;
                    default:
                        ex1 = cx + 3;
                        ey1 = cy - 4;
                        ex2 = cx + 3;
                        ey2 = cy + 4;
                }
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(ex1, ey1, 3.5, 0, 2 * Math.PI);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(ex2, ey2, 3.5, 0, 2 * Math.PI);
                ctx.fill();
                ctx.fillStyle = '#1e1e2f';
                ctx.beginPath();
                ctx.arc(ex1 + (direction === 'right' ? 1.5 : direction === 'left' ? -1.5 : 0),
                    ey1 + (direction === 'down' ? 1.5 : direction === 'up' ? -1.5 : 0),
                    1.8, 0, 2 * Math.PI);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(ex2 + (direction === 'right' ? 1.5 : direction === 'left' ? -1.5 : 0),
                    ey2 + (direction === 'down' ? 1.5 : direction === 'up' ? -1.5 : 0),
                    1.8, 0, 2 * Math.PI);
                ctx.fill();
            }

            // ---- Game Over / Win 蒙层 ----
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.65)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 38px system-ui, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const msg = winFlag ? '🎉 你赢了！' : '💀 游戏结束';
                ctx.fillText(msg, canvas.width / 2, canvas.height / 2 - 14);
                ctx.font = '18px system-ui, sans-serif';
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.fillText('点击「重新开始」再来一局', canvas.width / 2, canvas.height / 2 + 44);
            }
        }

        // ---------- roundRect 辅助 ----------
        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
            if (r > w / 2) r = w / 2;
            if (r > h / 2) r = h / 2;
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            this.closePath();
            return this;
        };

        // ---------- 键盘控制 ----------
        function handleKey(e) {
            const key = e.key;
            // 阻止页面滚动
            const arrowKeys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'];
            if (arrowKeys.includes(key) || ['w', 'W', 'A', 'a', 's', 'S', 'd', 'D'].includes(key)) {
                e.preventDefault();
            }
            if (gameOver) return;

            const map = {
                'ArrowUp': 'up',
                'w': 'up',
                'W': 'up',
                'ArrowDown': 'down',
                's': 'down',
                'S': 'down',
                'ArrowLeft': 'left',
                'a': 'left',
                'A': 'left',
                'ArrowRight': 'right',
                'd': 'right',
                'D': 'right'
            };
            const newDir = map[key];
            if (!newDir) return;

            const opposite = {
                'up': 'down',
                'down': 'up',
                'left': 'right',
                'right': 'left'
            };
            // 不能原地掉头
            if (opposite[newDir] !== direction) {
                nextDirection = newDir;
            }
        }

        // ---------- 触控支持（移动端方向键） ----------
        function setupTouchControls() {
            document.querySelectorAll('[data-dir]').forEach(btn => {
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    if (gameOver) return;
                    const dir = btn.dataset.dir;
                    const opposite = {
                        'up': 'down',
                        'down': 'up',
                        'left': 'right',
                        'right': 'left'
                    };
                    if (opposite[dir] !== direction) {
                        nextDirection = dir;
                    }
                });
            });
        }

        // ---------- 重启按钮 ----------
        document.getElementById('restartBtn').addEventListener('click', () => {
            initGame();
        });

        // ---------- 键盘监听 ----------
        window.addEventListener('keydown', handleKey);

        // ---------- 启动游戏 ----------
        setupTouchControls();
        initGame();
    </script>

</body>
</html>
