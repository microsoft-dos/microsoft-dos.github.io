<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microsoft-DOS 的附件仓库</title>
    <style>
        /* 全局重置 & 背景 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, #0b0e1a 0%, #1a1f33 50%, #0f1422 100%);
            padding: 20px;
            /* 增加一些动态光晕背景 */
            position: relative;
            overflow-x: hidden;
        }

        /* 背景装饰光效 */
        body::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(88, 130, 255, 0.08) 0%, transparent 70%);
            top: -200px;
            right: -200px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 200, 50, 0.05) 0%, transparent 70%);
            bottom: -150px;
            left: -150px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        /* 主卡片容器 — 磁吸玻璃质感 */
        .card {
            position: relative;
            z-index: 1;
            max-width: 820px;
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(18px) saturate(180%);
            -webkit-backdrop-filter: blur(18px) saturate(180%);
            border-radius: 56px;
            padding: 48px 40px 52px;
            box-shadow: 
                0 30px 80px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: transform 0.25s ease, box-shadow 0.3s ease;
            /* 磁吸效果：轻微悬浮，鼠标悬停时更明显 */
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 
                0 40px 100px rgba(0, 0, 0, 0.7),
                inset 0 1px 0 rgba(255, 255, 255, 0.12);
        }

        /* 标题区域 */
        .repo-title {
            text-align: center;
            margin-bottom: 36px;
        }

        .repo-title h1 {
            font-size: 2.4rem;
            font-weight: 600;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #f0f3ff 0%, #a0b8ff 80%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 40px rgba(80, 140, 255, 0.15);
            display: inline-block;
            padding: 0 20px;
        }

        /* 搜索框 — 磁吸卡片内元素 */
        .search-section {
            margin-bottom: 32px;
            display: flex;
            justify-content: center;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 60px;
            padding: 6px 6px 6px 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
            width: 100%;
            max-width: 540px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            /* 磁吸效果：聚焦或悬停时上浮 */
        }

        .search-box:focus-within {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 12px 32px rgba(0, 20, 80, 0.4);
            background: rgba(255, 255, 255, 0.08);
        }

        .search-box:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 0;
            font-size: 1rem;
            color: #f0f4ff;
            outline: none;
            letter-spacing: 0.3px;
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.35);
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .search-box button {
            background: rgba(255, 255, 255, 0.06);
            border: none;
            border-left: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px 28px;
            border-radius: 60px;
            color: #d0ddff;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            letter-spacing: 0.8px;
            backdrop-filter: blur(4px);
            white-space: nowrap;
        }

        .search-box button:hover {
            background: rgba(255, 255, 255, 0.14);
            color: #ffffff;
            box-shadow: 0 0 20px rgba(100, 160, 255, 0.15);
        }

        /* B站链接卡片 (磁吸) */
        .bilibili-link {
            text-align: center;
            margin-bottom: 40px;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
        }

        .bilibili-link:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.12);
            box-shadow: 0 12px 28px rgba(0, 20, 40, 0.3);
        }

        .bilibili-link a {
            color: #b8caff;
            text-decoration: none;
            font-size: 1.05rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
        }

        .bilibili-link a:hover {
            color: #ffffff;
        }

        .bilibili-link a::before {
            content: '▶';
            font-size: 0.7rem;
            color: #fb7299;
            opacity: 0.7;
        }

        /* 游戏入口卡片 — 强磁吸效果 */
        .game-entry {
            text-align: center;
            margin-top: 12px;
        }

        .game-btn {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            background: rgba(255, 215, 100, 0.06);
            padding: 18px 48px;
            border-radius: 80px;
            border: 1px solid rgba(255, 215, 100, 0.12);
            backdrop-filter: blur(8px);
            color: #ffe8b0;
            font-size: 1.4rem;
            font-weight: 500;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
            text-decoration: none;
            /* 磁吸核心 */
            transform: translateY(0);
        }

        .game-btn:hover {
            transform: translateY(-6px) scale(1.02);
            background: rgba(255, 215, 100, 0.12);
            border-color: rgba(255, 215, 100, 0.35);
            box-shadow: 0 20px 48px rgba(255, 200, 50, 0.15), 0 0 40px rgba(255, 200, 50, 0.05);
            color: #fff5d0;
        }

        .game-btn:active {
            transform: translateY(0px) scale(0.98);
        }

        .game-btn span {
            font-size: 1.8rem;
            line-height: 1;
        }

        /* 微调响应式 */
        @media (max-width: 600px) {
            .card {
                padding: 32px 20px 36px;
                border-radius: 36px;
            }
            .repo-title h1 {
                font-size: 1.6rem;
            }
            .search-box {
                flex-wrap: wrap;
                background: rgba(255, 255, 255, 0.03);
                padding: 8px;
                border-radius: 40px;
            }
            .search-box input {
                width: 100%;
                padding: 14px 18px;
                font-size: 0.95rem;
                text-align: center;
            }
            .search-box button {
                width: 100%;
                border-left: none;
                border-top: 1px solid rgba(255, 255, 255, 0.06);
                padding: 14px;
                border-radius: 40px;
            }
            .game-btn {
                padding: 14px 28px;
                font-size: 1.2rem;
                width: 100%;
                justify-content: center;
            }
            .bilibili-link a {
                font-size: 0.95rem;
                flex-wrap: wrap;
                justify-content: center;
            }
        }

        /* 简单工具占位提示，后续可删 */
        .footer-note {
            margin-top: 28px;
            text-align: center;
            color: rgba(255, 255, 255, 0.12);
            font-size: 0.75rem;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- 主标题 -->
        <div class="repo-title">
            <h1>⚙️ Microsoft-DOS 的附件仓库</h1>
        </div>

        <!-- 搜索框 (磁吸) -->
        <div class="search-section">
            <div class="search-box">
                <input type="text" placeholder="🔍 在此搜索工具、脚本或关键词..." aria-label="搜索仓库内容">
                <button type="button">搜索</button>
            </div>
        </div>

        <!-- Bilibili 账号链接 (磁吸) -->
        <div class="bilibili-link">
            <a href="https://space.bilibili.com/3706992560441419?spm_id_from=333.1007.0.0" target="_blank" rel="noopener noreferrer">
                Bilibili 账号：Microsoft-DOS
            </a>
        </div>

        <!-- 游戏入口 (磁吸 + 跳转) -->
        <div class="game-entry">
            <a href="https://microsoft-dos.github.io/game" class="game-btn" target="_blank">
                <span>🎮</span> 休闲小游戏
            </a>
        </div>

        <!-- 优雅的小尾巴 (可选) -->
        <div class="footer-note">
            —— 工具集散地 · 慢慢充实 ——
        </div>
    </div>
</body>
</html>
