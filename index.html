<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Microsoft-DOS 的附件仓库</title>
    <style>
        /* ===== 全局样式 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background: linear-gradient(145deg, #0b0e1a 0%, #1a1f33 50%, #0f1422 100%);
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* 背景光晕 */
        body::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(88, 130, 255, 0.08) 0%, transparent 70%);
            top: -200px;
            right: -200px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 200, 50, 0.05) 0%, transparent 70%);
            bottom: -150px;
            left: -150px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        /* ===== 主容器 ===== */
        .main-wrapper {
            position: relative;
            z-index: 1;
            max-width: 820px;
            width: 100%;
        }

        /* 主卡片 */
        .card {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(18px) saturate(180%);
            -webkit-backdrop-filter: blur(18px) saturate(180%);
            border-radius: 56px;
            padding: 48px 40px 40px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: transform 0.25s ease, box-shadow 0.3s ease;
            margin-bottom: 30px;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.12);
        }

        /* 标题 */
        .repo-title {
            text-align: center;
            margin-bottom: 36px;
        }

        .repo-title h1 {
            font-size: 2.4rem;
            font-weight: 600;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #f0f3ff 0%, #a0b8ff 80%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 40px rgba(80, 140, 255, 0.15);
            display: inline-block;
            padding: 0 20px;
        }

        /* 搜索框 */
        .search-section {
            margin-bottom: 24px;
            display: flex;
            justify-content: center;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 60px;
            padding: 6px 6px 6px 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
            width: 100%;
            max-width: 540px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .search-box:focus-within {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 12px 32px rgba(0, 20, 80, 0.4);
            background: rgba(255, 255, 255, 0.08);
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 0;
            font-size: 1rem;
            color: #f0f4ff;
            outline: none;
            letter-spacing: 0.3px;
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.35);
            font-weight: 300;
        }

        .search-box button {
            background: rgba(255, 255, 255, 0.06);
            border: none;
            border-left: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px 28px;
            border-radius: 60px;
            color: #d0ddff;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            letter-spacing: 0.8px;
            backdrop-filter: blur(4px);
            white-space: nowrap;
        }

        .search-box button:hover {
            background: rgba(255, 255, 255, 0.14);
            color: #ffffff;
            box-shadow: 0 0 20px rgba(100, 160, 255, 0.15);
        }

        /* B站链接 */
        .bilibili-link {
            text-align: center;
            margin-bottom: 20px;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
        }

        .bilibili-link:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.12);
            box-shadow: 0 12px 28px rgba(0, 20, 40, 0.3);
        }

        .bilibili-link a {
            color: #b8caff;
            text-decoration: none;
            font-size: 1.05rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
        }

        .bilibili-link a:hover {
            color: #ffffff;
        }

        .bilibili-link a::before {
            content: '▶';
            font-size: 0.7rem;
            color: #fb7299;
            opacity: 0.7;
        }

        /* 游戏入口 */
        .game-entry {
            text-align: center;
            margin-top: 8px;
        }

        .game-btn {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            background: rgba(255, 215, 100, 0.06);
            padding: 18px 48px;
            border-radius: 80px;
            border: 1px solid rgba(255, 215, 100, 0.12);
            backdrop-filter: blur(8px);
            color: #ffe8b0;
            font-size: 1.4rem;
            font-weight: 500;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
            text-decoration: none;
            transform: translateY(0);
        }

        .game-btn:hover {
            transform: translateY(-6px) scale(1.02);
            background: rgba(255, 215, 100, 0.12);
            border-color: rgba(255, 215, 100, 0.35);
            box-shadow: 0 20px 48px rgba(255, 200, 50, 0.15), 0 0 40px rgba(255, 200, 50, 0.05);
            color: #fff5d0;
        }

        .game-btn:active {
            transform: translateY(0px) scale(0.98);
        }

        .game-btn span {
            font-size: 1.8rem;
            line-height: 1;
        }

        /* ===== 搜索结果区域 ===== */
        .results-area {
            display: none;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            margin-top: 8px;
            animation: fadeIn 0.3s ease;
        }

        .results-area.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .results-count {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
            padding-left: 8px;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .results-count strong {
            color: #f0f4ff;
        }

        /* ===== 工具卡片（磁吸效果） ===== */
        .tool-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 24px 28px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
            cursor: pointer;
            text-decoration: none;
            display: block;
            transform: translateY(0);
        }

        .tool-card:hover {
            transform: translateY(-6px) scale(1.01);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.18);
            box-shadow: 0 20px 48px rgba(0, 0, 0, 0.4), 0 0 30px rgba(100, 160, 255, 0.05);
        }

        .tool-card:active {
            transform: translateY(0px) scale(0.98);
        }

        .tool-card .tool-title {
            color: #f0f4ff;
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .tool-card .tool-desc {
            color: rgba(255, 255, 255, 0.55);
            font-size: 0.95rem;
            font-weight: 300;
            line-height: 1.5;
            margin-bottom: 10px;
        }

        .tool-card .tool-link {
            color: rgba(160, 180, 255, 0.6);
            font-size: 0.8rem;
            font-family: monospace;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .tool-card:hover .tool-link {
            color: rgba(160, 180, 255, 0.9);
        }

        .tool-card .tool-link::before {
            content: '🔗';
            font-size: 0.7rem;
        }

        .no-result {
            color: rgba(255, 255, 255, 0.3);
            text-align: center;
            padding: 40px 20px;
            font-size: 1rem;
            letter-spacing: 1px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 24px;
            border: 1px dashed rgba(255, 255, 255, 0.06);
        }

        /* 响应式 */
        @media (max-width: 600px) {
            body {
                padding: 20px 12px;
            }
            .card {
                padding: 28px 18px 30px;
                border-radius: 36px;
            }
            .repo-title h1 {
                font-size: 1.6rem;
            }
            .search-box {
                flex-wrap: wrap;
                padding: 8px;
                border-radius: 40px;
            }
            .search-box input {
                width: 100%;
                padding: 14px 18px;
                font-size: 0.95rem;
                text-align: center;
            }
            .search-box button {
                width: 100%;
                border-left: none;
                border-top: 1px solid rgba(255, 255, 255, 0.06);
                padding: 14px;
                border-radius: 40px;
            }
            .game-btn {
                padding: 14px 28px;
                font-size: 1.2rem;
                width: 100%;
                justify-content: center;
            }
            .tool-card {
                padding: 18px 18px;
            }
            .tool-card .tool-title {
                font-size: 1.05rem;
            }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <!-- ===== 主卡片 ===== -->
        <div class="card">
            <div class="repo-title">
                <h1>⚙️ Microsoft-DOS 的附件仓库</h1>
            </div>

            <!-- 搜索框 -->
            <div class="search-section">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="🔍 搜索工具名称或介绍..." aria-label="搜索仓库内容">
                    <button id="searchBtn">搜索</button>
                </div>
            </div>

            <!-- B站链接 -->
            <div class="bilibili-link">
                <a href="https://space.bilibili.com/3706992560441419?spm_id_from=333.1007.0.0" target="_blank" rel="noopener noreferrer">
                    Bilibili 账号：Microsoft-DOS
                </a>
            </div>

            <!-- 游戏入口 -->
            <div class="game-entry">
                <a href="https://microsoft-dos.github.io/game" class="game-btn" target="_blank">
                    <span>🎮</span> 休闲小游戏
                </a>
            </div>
        </div>

        <!-- ===== 搜索结果区域 ===== -->
        <div class="results-area" id="resultsArea">
            <div class="results-count" id="resultsCount"></div>
            <div id="resultsList"></div>
        </div>
    </div>

    <script>
        // ============================================================
        //  1. 工具数据（在这里添加你的工具）
        // ============================================================
        const TOOLS = [
    {
        id: 'kyos',
        title: 'KylinOS.iso',
        desc: '银河麒麟系统镜像下载，适用于自主可控的桌面与服务器环境。',
        link: 'https://microsoft-dos.github.io/kyos'
    },
    {
        id: 'wi10',
        title: 'Windows 10 22H2.iso',
        desc: '微软官方 Windows 10 22H2 版本系统镜像，适用于纯净安装或系统修复。',
        link: 'https://microsoft-dos.github.io/wi10'
    },  // ← 加上这个逗号
    {
        id: 'zuby',
        title: '资源编译器',
        desc: '一款用于编译和打包资源文件的工具，适合开发者在项目中管理和优化资源。',
        link: 'https://microsoft-dos.github.io/zuby'
    }
    // 以后继续添加更多工具...
];

        // ============================================================
        //  2. DOM 引用
        // ============================================================
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultsArea = document.getElementById('resultsArea');
        const resultsCount = document.getElementById('resultsCount');
        const resultsList = document.getElementById('resultsList');

        // ============================================================
        //  3. 搜索逻辑
        // ============================================================
        function performSearch() {
            const keyword = searchInput.value.trim().toLowerCase();

            if (keyword === '') {
                resultsArea.classList.remove('active');
                return;
            }

            const matched = TOOLS.filter(tool =>
                tool.title.toLowerCase().includes(keyword) ||
                tool.desc.toLowerCase().includes(keyword)
            );

            renderResults(matched, keyword);
        }

        // ============================================================
        //  4. 渲染结果卡片
        // ============================================================
        function renderResults(tools, keyword) {
            resultsList.innerHTML = '';

            if (tools.length === 0) {
                resultsCount.innerHTML = `🔍 未找到与 "<strong>${keyword}</strong>" 相关的工具`;
                resultsList.innerHTML = `<div class="no-result">😕 暂无匹配的工具，试试其他关键词吧</div>`;
                resultsArea.classList.add('active');
                return;
            }

            resultsCount.innerHTML = `📦 找到 <strong>${tools.length}</strong> 个匹配工具`;

            tools.forEach(tool => {
                const titleHighlight = highlightText(tool.title, keyword);
                const descHighlight = highlightText(tool.desc, keyword);

                const card = document.createElement('a');
                card.className = 'tool-card';
                card.href = tool.link;
                card.target = '_blank';
                card.innerHTML = `
                        <div class="tool-title">${titleHighlight}</div>
                        <div class="tool-desc">${descHighlight}</div>
                        <div class="tool-link">${tool.link}</div>
                    `;
                resultsList.appendChild(card);
            });

            resultsArea.classList.add('active');
        }

        // ============================================================
        //  5. 关键词高亮辅助
        // ============================================================
        function highlightText(text, keyword) {
            const regex = new RegExp(`(${keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return text.replace(regex, (match) =>
                `<span style="background:#facc15;color:#1a1f33;padding:0 4px;border-radius:3px;font-weight:600;">${match}</span>`
                );
        }

        // ============================================================
        //  6. 事件绑定
        // ============================================================
        searchBtn.addEventListener('click', performSearch);

        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                performSearch();
            }
        });
    </script>

</body>
</html>
