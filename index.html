<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microsoft-DOS 的极客资源库</title>
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background: #0b0d15;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* ===== 动态流动背景球体（赛博风格） ===== */
        .bg-orb {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #f093fb, #f5576c, #4facfe);
            filter: blur(80px);
            opacity: 0.5;
            animation: orbMove 12s ease-in-out infinite alternate;
            z-index: 0;
        }
        .bg-orb:nth-child(2) {
            width: 400px;
            height: 400px;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 70% 70%, #43e97b, #38f9d7);
            animation-duration: 18s;
            animation-delay: -4s;
            opacity: 0.3;
        }
        @keyframes orbMove {
            0% { transform: translate(-100px, -80px) scale(1); }
            100% { transform: translate(120px, 100px) scale(1.3); }
        }

        /* ===== 星空背景（叠加在光晕之上） ===== */
        #starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ===== 主容器 ===== */
        .main-wrapper {
            position: relative;
            z-index: 1;
            max-width: 860px;
            width: 100%;
        }

        /* ===== 赛博风格标题 ===== */
        .cyber-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .cyber-header h1 {
            font-family: 'Courier New', monospace;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 4px;
            color: #00f2ff;
            text-shadow: 0 0 30px rgba(0, 242, 255, 0.15);
            background: rgba(255, 255, 255, 0.02);
            padding: 8px 20px;
            border-radius: 40px;
            border: 1px solid rgba(0, 242, 255, 0.08);
        }
        .cyber-header h1 span {
            color: #fff;
            opacity: 0.3;
            font-weight: 300;
        }

        /* ===== 主卡片 — 液态玻璃（赛博风格） ===== */
        .card {
            position: relative;
            overflow: hidden;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 48px;
            padding: 40px 40px 36px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow:
                0 30px 80px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin-bottom: 30px;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -40%;
            left: -20%;
            width: 70%;
            height: 50%;
            background: radial-gradient(ellipse at 30% 20%, rgba(0, 242, 255, 0.06) 0%, transparent 70%);
            pointer-events: none;
            border-radius: 50%;
            transition: transform 0.5s ease;
        }

        .card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 5%;
            right: 5%;
            height: 30%;
            background: linear-gradient(to top, rgba(0, 242, 255, 0.03) 0%, transparent 100%);
            pointer-events: none;
            border-radius: 0 0 48px 48px;
        }

        .card .glass-edge {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 48px;
            pointer-events: none;
            background: linear-gradient(135deg, rgba(0, 242, 255, 0.04) 0%, transparent 30%, transparent 70%, rgba(0, 242, 255, 0.02) 100%);
            z-index: 0;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(0, 242, 255, 0.10);
        }

        .card>*:not(.glass-edge) {
            position: relative;
            z-index: 1;
        }

        /* ===== 搜索框（赛博风格） ===== */
        .search-section {
            margin-bottom: 24px;
            display: flex;
            justify-content: center;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 60px;
            padding: 6px 6px 6px 24px;
            border: 1px solid rgba(0, 242, 255, 0.10);
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
            width: 100%;
            max-width: 540px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .search-box:focus-within {
            transform: translateY(-2px);
            border-color: rgba(0, 242, 255, 0.30);
            box-shadow: 0 12px 32px rgba(0, 242, 255, 0.06);
            background: rgba(255, 255, 255, 0.05);
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 0;
            font-size: 1rem;
            color: #f0f4ff;
            outline: none;
            letter-spacing: 0.5px;
            font-family: 'Courier New', monospace;
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.20);
            font-weight: 300;
            letter-spacing: 1px;
        }

        .search-box button {
            background: rgba(0, 242, 255, 0.06);
            border: none;
            border-left: 1px solid rgba(0, 242, 255, 0.08);
            padding: 12px 28px;
            border-radius: 60px;
            color: #00f2ff;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            backdrop-filter: blur(4px);
            white-space: nowrap;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
        }

        .search-box button:hover {
            background: rgba(0, 242, 255, 0.12);
            color: #ffffff;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.08);
        }

        /* ===== 快捷入口（B站 + 游戏） ===== */
        .quick-links {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .quick-link {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.9rem;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .quick-link:hover {
            transform: translateY(-3px);
            background: rgba(0, 242, 255, 0.04);
            border-color: rgba(0, 242, 255, 0.12);
            color: #00f2ff;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.2);
        }

        .quick-link .icon {
            font-size: 1rem;
            opacity: 0.6;
        }

        /* ===== 游戏按钮（液态玻璃风格） ===== */
        .game-btn {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            background: rgba(0, 242, 255, 0.04);
            padding: 16px 40px;
            border-radius: 60px;
            border: 1px solid rgba(0, 242, 255, 0.08);
            backdrop-filter: blur(8px);
            color: #a0d8ff;
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            text-decoration: none;
            transform: translateY(0);
            position: relative;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        .game-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg at 50% 50%, transparent 0deg, rgba(0, 242, 255, 0.06) 30deg, rgba(0, 242, 255, 0.02) 60deg, transparent 90deg);
            animation: liquidSwirl 8s linear infinite;
            pointer-events: none;
        }

        @keyframes liquidSwirl {
            0% { transform: rotate(0deg) scale(1.2); }
            100% { transform: rotate(360deg) scale(1.2); }
        }

        .game-btn:hover {
            transform: translateY(-6px) scale(1.02);
            background: rgba(0, 242, 255, 0.08);
            border-color: rgba(0, 242, 255, 0.25);
            box-shadow: 0 20px 48px rgba(0, 242, 255, 0.08);
            color: #ffffff;
        }

        .game-btn span {
            font-size: 1.6rem;
            line-height: 1;
            position: relative;
            z-index: 1;
        }
        .game-btn .label {
            position: relative;
            z-index: 1;
        }

        /* ===== 搜索结果 ===== */
        .results-area {
            display: none;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            margin-top: 8px;
            animation: fadeIn 0.3s ease;
        }

        .results-area.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .results-count {
            color: rgba(255, 255, 255, 0.20);
            font-size: 0.8rem;
            padding-left: 8px;
            margin-bottom: 4px;
            letter-spacing: 1px;
            font-family: 'Courier New', monospace;
        }

        .results-count strong {
            color: #00f2ff;
        }

        /* ===== 工具卡片 — 赛博网格 ===== */
        #resultsList {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .tool-card {
            position: relative;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 22px 24px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
            cursor: pointer;
            text-decoration: none;
            display: block;
            transform: translateY(0);
        }

        .tool-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -30%;
            width: 70%;
            height: 50%;
            background: radial-gradient(ellipse at 30% 20%, rgba(0, 242, 255, 0.03) 0%, transparent 70%);
            pointer-events: none;
            border-radius: 50%;
            transition: transform 0.5s ease;
        }

        .tool-card:hover {
            transform: translateY(-6px) scale(1.01);
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(0, 242, 255, 0.15);
            box-shadow: 0 20px 48px rgba(0, 0, 0, 0.2), 0 0 30px rgba(0, 242, 255, 0.03);
        }

        .tool-card:hover::before {
            transform: translate(5%, 3%);
        }

        .tool-card>* {
            position: relative;
            z-index: 1;
        }

        .tool-card .tool-title {
            color: #f0f4ff;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            font-family: 'Courier New', monospace;
        }

        .tool-card .tool-desc {
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.9rem;
            font-weight: 300;
            line-height: 1.5;
            margin-bottom: 10px;
        }

        .tool-card .tool-link {
            color: rgba(0, 242, 255, 0.30);
            font-size: 0.7rem;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .tool-card:hover .tool-link {
            color: rgba(0, 242, 255, 0.50);
        }

        .no-result {
            color: rgba(255, 255, 255, 0.15);
            text-align: center;
            padding: 40px 20px;
            font-size: 0.9rem;
            letter-spacing: 1px;
            background: rgba(255, 255, 255, 0.01);
            border-radius: 24px;
            border: 1px dashed rgba(255, 255, 255, 0.03);
            font-family: 'Courier New', monospace;
            grid-column: 1 / -1;
        }

        /* ===== 技术日志（赛博风格） ===== */
        #techLog {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9998;
            max-width: 600px;
            width: 90%;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 12px 24px;
            border: 1px solid rgba(0, 242, 255, 0.04);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.4s ease;
            opacity: 0.7;
            cursor: pointer;
        }
        #techLog:hover {
            opacity: 1;
        }
        #techLog .log-content {
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255, 255, 255, 0.12);
            font-size: 0.6rem;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.5px;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }
        #techLog .log-content .tag {
            color: rgba(0, 242, 255, 0.30);
            flex-shrink: 0;
        }
        #techLog .log-content .dot {
            display: inline-block;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #00f2ff;
            margin-right: 4px;
            animation: pulseDot 2s ease-in-out infinite;
            flex-shrink: 0;
        }
        @keyframes pulseDot {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* ===== 响应式 ===== */
        @media (max-width: 600px) {
            body {
                padding: 20px 12px;
            }
            .card {
                padding: 24px 16px 28px;
                border-radius: 32px;
            }
            .card .glass-edge {
                border-radius: 32px;
            }
            .card::after {
                border-radius: 0 0 32px 32px;
            }
            .cyber-header h1 {
                font-size: 1.2rem;
                letter-spacing: 2px;
                padding: 6px 14px;
            }
            .search-box {
                flex-wrap: wrap;
                padding: 8px;
                border-radius: 40px;
            }
            .search-box input {
                width: 100%;
                padding: 12px 16px;
                font-size: 0.9rem;
                text-align: center;
            }
            .search-box button {
                width: 100%;
                border-left: none;
                border-top: 1px solid rgba(0, 242, 255, 0.06);
                padding: 12px;
                border-radius: 40px;
                justify-content: center;
            }
            #resultsList {
                grid-template-columns: 1fr;
            }
            .game-btn {
                padding: 14px 24px;
                font-size: 1rem;
                width: 100%;
                justify-content: center;
            }
            .quick-links {
                flex-direction: column;
                align-items: center;
            }
            .quick-link {
                width: 100%;
                justify-content: center;
            }
            #techLog {
                bottom: 12px;
                padding: 8px 16px;
                width: 95%;
            }
            #techLog .log-content {
                font-size: 0.5rem;
            }
        }

        /* ===== 加速球遮罩（复用之前的） ===== */
        #acceleratorOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 30, 0.88);
            backdrop-filter: blur(16px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        #acceleratorOverlay .box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 40px;
            padding: 50px 60px;
            border: 1px solid rgba(0, 242, 255, 0.06);
            max-width: 440px;
            width: 90%;
            text-align: center;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
        }
        #acceleratorOverlay .box .icon {
            font-size: 3.5rem;
            margin-bottom: 16px;
        }
        #acceleratorOverlay .box .status {
            color: #f0f4ff;
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 1px;
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
        }
        #acceleratorOverlay .box .progress-bar {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 24px;
        }
        #acceleratorOverlay .box .progress-bar .fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00f2ff, #a78bfa);
            border-radius: 4px;
            transition: width 0.1s linear;
        }
        #acceleratorOverlay .box .btn-go {
            display: none;
            background: rgba(0, 242, 255, 0.06);
            border: 1px solid rgba(0, 242, 255, 0.12);
            padding: 14px 40px;
            border-radius: 60px;
            color: #00f2ff;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            font-family: 'Courier New', monospace;
        }
        #acceleratorOverlay .box .btn-go:hover {
            background: rgba(0, 242, 255, 0.12);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.06);
            color: #ffffff;
        }
        #acceleratorOverlay .box .note {
            margin-top: 16px;
            color: rgba(255, 255, 255, 0.12);
            font-size: 0.65rem;
            letter-spacing: 0.5px;
            font-family: 'Courier New', monospace;
        }

        /* ===== 校验倒计时 ===== */
        #verifyOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 30, 0.78);
            backdrop-filter: blur(10px);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        #verifyOverlay .box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 32px;
            padding: 40px 50px;
            border: 1px solid rgba(0, 242, 255, 0.04);
            max-width: 380px;
            width: 90%;
            text-align: center;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
        }
        #verifyOverlay .box .icon {
            font-size: 2.8rem;
            margin-bottom: 12px;
        }
        #verifyOverlay .box .title {
            color: #f0f4ff;
            font-size: 1.1rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            font-family: 'Courier New', monospace;
        }
        #verifyOverlay .box .sub {
            color: rgba(255, 255, 255, 0.20);
            font-size: 0.85rem;
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
        }
        #verifyOverlay .box .count {
            font-size: 3rem;
            font-weight: 200;
            color: #00f2ff;
            letter-spacing: 2px;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>

    <!-- ===== 动态流动背景球体 ===== -->
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>

    <!-- ===== 星空背景 ===== -->
    <canvas id="starfield"></canvas>

    <div class="main-wrapper">

        <!-- ===== 赛博风格标题 + 搜索 ===== -->
        <div class="cyber-header">
            <h1>⚙️ Microsoft-DOS 极客资源库</h1>
        </div>

        <!-- ===== 主卡片 ===== -->
        <div class="card">
            <div class="glass-edge"></div>

            <!-- 搜索框 -->
            <div class="search-section">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="> 搜索工具..." aria-label="搜索仓库内容">
                    <button id="searchBtn">SEARCH</button>
                </div>
            </div>

            <!-- 快捷入口 -->
            <div class="quick-links">
    <a href="https://space.bilibili.com/3706992560441419?spm_id_from=333.1007.0.0" target="_blank" class="quick-link" rel="noopener noreferrer">
        <span class="icon">📺</span> BILIBILI
    </a>
    <a href="https://microsoft-dos.github.io/game" class="game-btn" target="_blank">
        <span>🎮</span>
        <span class="label">PLAY</span>
    </a>
    <a href="https://microsoft-dos.github.io/boke" class="quick-link" target="_blank" rel="noopener noreferrer">
        <span class="icon">📝</span> 博客
    </a>
</div>
        </div>

        <!-- ===== 搜索结果 ===== -->
        <div class="results-area" id="resultsArea">
            <div class="results-count" id="resultsCount"></div>
            <div id="resultsList"></div>
        </div>
    </div>

    <!-- ===== 加速球遮罩 ===== -->
    <div id="acceleratorOverlay">
        <div class="box">
            <div class="icon">🚀</div>
            <div class="status" id="acceleratorStatus">正在分配最优节点...</div>
            <div class="progress-bar"><div class="fill" id="acceleratorProgress"></div></div>
            <button class="btn-go" id="acceleratorBtn">⚡ 极速通道</button>
            <div class="note">NODE OPTIMIZED · TUNNEL ESTABLISHED</div>
        </div>
    </div>

    <!-- ===== 校验倒计时 ===== -->
    <div id="verifyOverlay">
        <div class="box">
            <div class="icon">🔒</div>
            <div class="title">安全校验中</div>
            <div class="sub">验证文件完整性...</div>
            <div class="count" id="verifyCountdown">3</div>
        </div>
    </div>

    <!-- ===== 技术日志（赛博风格） ===== -->
    <div id="techLog">
        <div class="log-content">
            <span class="dot"></span>
            <span class="tag">[SYS]</span>
            <span id="logText">系统就绪 · 等待请求</span>
        </div>
    </div>

    <script>
        // ============================================================
        //  1. 工具数据
        // ============================================================
        const TOOLS = [
            { id: 'kyos', title: 'KylinOS.iso', desc: '银河麒麟系统镜像下载，适用于自主可控的桌面与服务器环境。', link: 'https://microsoft-dos.github.io/kyos' },
            { id: 'wi10', title: 'Windows 10 22H2.iso', desc: '微软官方 Windows 10 22H2 版本系统镜像，适用于纯净安装或系统修复。', link: 'https://microsoft-dos.github.io/wi10' },
            { id: 'wi11', title: 'Windows 11 25H2.iso', desc: '微软官方 Windows 11 25H2 版本（商业版）系统镜像。', link: 'https://microsoft-dos.github.io/wi11' },
            { id: 'dabaicai', title: 'DaBaiCai.iso', desc: '大白菜系统镜像，一款轻量级、易用的操作系统镜像文件。', link: 'https://microsoft-dos.github.io/dabaicai' },
            { id: 'dg', title: '分区工具 (DG)', desc: '一款专业的磁盘分区管理工具，支持分区调整、格式化、数据恢复等高级功能。', link: 'https://microsoft-dos.github.io/dg' },
            { id: 'zuby', title: '资源编译器', desc: '一款用于编译和打包资源文件的工具（ResourceHacker）。', link: 'https://microsoft-dos.github.io/zuby' },
            {id: 'dism', title: 'Dism++',desc: '一款强大的 Windows 系统优化与清理工具，集成了系统备份、还原、驱动管理等多种功能。', link: 'https://microsoft-dos.github.io/dism'}
        ];

        // ============================================================
        //  2. DOM 引用
        // ============================================================
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultsArea = document.getElementById('resultsArea');
        const resultsCount = document.getElementById('resultsCount');
        const resultsList = document.getElementById('resultsList');
        const logText = document.getElementById('logText');

        // ============================================================
        //  3. 搜索逻辑
        // ============================================================
        function performSearch() {
            const keyword = searchInput.value.trim().toLowerCase();

            if (keyword === '') {
                resultsArea.classList.remove('active');
                return;
            }

            if (keyword === '*' || keyword === '＊') {
                renderResults(TOOLS, '全部工具');
                return;
            }

            const matched = TOOLS.filter(tool =>
                tool.title.toLowerCase().includes(keyword) ||
                tool.desc.toLowerCase().includes(keyword)
            );

            renderResults(matched, keyword);
        }

        // ============================================================
        //  4. 渲染结果
        // ============================================================
        function renderResults(tools, keyword) {
            resultsList.innerHTML = '';

            if (tools.length === 0) {
                resultsCount.innerHTML = `🔍 未找到与 "<strong>${keyword}</strong>" 相关的工具`;
                resultsList.innerHTML = `<div class="no-result">⛔ 未找到匹配项</div>`;
                resultsArea.classList.add('active');
                return;
            }

            resultsCount.innerHTML = `📦 找到 <strong>${tools.length}</strong> 个匹配工具`;

            tools.forEach(tool => {
                const titleHighlight = highlightText(tool.title, keyword);
                const descHighlight = highlightText(tool.desc, keyword);

                const card = document.createElement('a');
                card.className = 'tool-card';
                card.href = tool.link;
                card.target = '_blank';
                card.innerHTML = `
                        <div class="tool-title">${titleHighlight}</div>
                        <div class="tool-desc">${descHighlight}</div>
                        <div class="tool-link">${tool.link}</div>
                    `;
                resultsList.appendChild(card);
            });

            resultsArea.classList.add('active');
        }

        // ============================================================
        //  5. 高亮辅助
        // ============================================================
        function highlightText(text, keyword) {
            if (keyword === '全部工具') return text;
            const regex = new RegExp(`(${keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return text.replace(regex, (match) =>
                `<span style="background:rgba(0,242,255,0.15);color:#00f2ff;padding:0 4px;border-radius:3px;font-weight:600;">${match}</span>`
            );
        }

        // ============================================================
        //  6. 事件绑定
        // ============================================================
        searchBtn.addEventListener('click', performSearch);

        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                performSearch();
            }
        });

        // ============================================================
        //  7. 快捷键：/ 聚焦搜索框
        // ============================================================
        document.addEventListener('keydown', (e) => {
            if (e.key === '/' && !['INPUT', 'TEXTAREA'].includes(e.target.tagName)) {
                e.preventDefault();
                searchInput.focus();
            }
        });

        // ============================================================
        //  8. 技术日志
        // ============================================================
        function updateLog(message) {
            const timestamp = new Date().toLocaleTimeString('zh-CN', { hour12: false });
            logText.textContent = `[${timestamp}] ${message}`;
        }
        updateLog('系统就绪 · 等待请求');

        // ============================================================
        //  9. 加速球 + 校验倒计时（独立版）
        // ============================================================
        const acceleratorOverlay = document.getElementById('acceleratorOverlay');
        const acceleratorStatus = document.getElementById('acceleratorStatus');
        const acceleratorProgress = document.getElementById('acceleratorProgress');
        const acceleratorBtn = document.getElementById('acceleratorBtn');
        const verifyOverlay = document.getElementById('verifyOverlay');
        const verifyCountdown = document.getElementById('verifyCountdown');

        // 暴露给详情页调用
        window.showAccelerator = function(downloadUrl, toolName) {
            acceleratorOverlay.style.display = 'flex';
            acceleratorStatus.textContent = '🔄 正在分配最优节点...';
            acceleratorProgress.style.width = '0%';
            acceleratorBtn.style.display = 'none';

            if (toolName && window.updateLog) {
                window.updateLog(`📥 收到请求: ${toolName}`);
            }

            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 6 + 2;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    acceleratorStatus.textContent = '✅ 节点优选完成 · 隧道已建立';
                    acceleratorBtn.style.display = 'inline-block';
                    // 绑定跳转
                    acceleratorBtn.onclick = function() {
                        acceleratorOverlay.style.display = 'none';
                        showVerifyCountdown(downloadUrl);
                    };
                }
                acceleratorProgress.style.width = progress + '%';
            }, 80);
        };

        function showVerifyCountdown(downloadUrl) {
            verifyOverlay.style.display = 'flex';
            let count = 3;
            verifyCountdown.textContent = count;
            const timer = setInterval(() => {
                count--;
                if (count <= 0) {
                    clearInterval(timer);
                    verifyOverlay.style.display = 'none';
                    window.location.href = downloadUrl;
                    updateLog('✅ 资源交付完成');
                } else {
                    verifyCountdown.textContent = count;
                    updateLog(`🔒 校验中: ${count}s`);
                }
            }, 1000);
        }

        // 点击遮罩可关闭（方便测试）
        acceleratorOverlay.addEventListener('click', function(e) {
            if (e.target === this) this.style.display = 'none';
        });
        verifyOverlay.addEventListener('click', function(e) {
            if (e.target === this) this.style.display = 'none';
        });

        // ============================================================
        //  10. 动态星空背景
        // ============================================================
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const stars = [];
        const NUM_STARS = 100;
        for (let i = 0; i < NUM_STARS; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 1.5 + 0.3,
                speed: 0.003 + Math.random() * 0.015,
                phase: Math.random() * Math.PI * 2,
            });
        }

        function drawStars(time) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (const star of stars) {
                const brightness = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(time * star.speed + star.phase));
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, 2 * Math.PI);
                ctx.fillStyle = `rgba(255, 255, 255, ${brightness * 0.4})`;
                ctx.fill();
            }
            requestAnimationFrame(drawStars);
        }
        drawStars(0);
    </script>

</body>
</html>
