<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microsoft-DOS 的附件仓库</title>
    <style>
        /* ===== 全局样式 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background: linear-gradient(145deg, #1a1a3e 0%, #2d2b55 30%, #1a1a3e 100%);
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        #starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        body::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(120, 100, 255, 0.12) 0%, transparent 70%);
            top: -200px;
            right: -200px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 200, 100, 0.06) 0%, transparent 70%);
            bottom: -150px;
            left: -150px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .main-wrapper {
            position: relative;
            z-index: 1;
            max-width: 820px;
            width: 100%;
        }

        /* ===== 主卡片 — 发光玻璃 ===== */
        .card {
            position: relative;
            overflow: hidden;
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 56px;
            padding: 48px 40px 40px;
            border: 1px solid rgba(255, 255, 255, 0.10);
            box-shadow:
                0 30px 80px rgba(0, 0, 0, 0.4),
                inset 0 0 0 1px rgba(255, 255, 255, 0.04),
                inset 0 1px 0 rgba(255, 255, 255, 0.20),
                inset 0 -1px 0 rgba(255, 255, 255, 0.04);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin-bottom: 30px;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -30%;
            left: -20%;
            width: 70%;
            height: 50%;
            background: radial-gradient(ellipse at 30% 20%, rgba(255, 255, 255, 0.20) 0%, rgba(255, 255, 255, 0.04) 40%, transparent 70%);
            pointer-events: none;
            border-radius: 50%;
            transition: transform 0.5s ease;
        }

        .card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 5%;
            right: 5%;
            height: 30%;
            background: linear-gradient(to top, rgba(255, 255, 255, 0.06) 0%, transparent 100%);
            pointer-events: none;
            border-radius: 0 0 56px 56px;
        }

        .card .glass-edge {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 56px;
            pointer-events: none;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, transparent 30%, transparent 70%, rgba(255, 255, 255, 0.03) 100%);
            z-index: 0;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.4), inset 0 0 0 1px rgba(255, 255, 255, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.30);
        }

        .card:hover::before {
            transform: translate(5%, 3%);
        }

        .card>*:not(.glass-edge) {
            position: relative;
            z-index: 1;
        }

        .repo-title {
            text-align: center;
            margin-bottom: 36px;
        }

        .repo-title h1 {
            font-size: 2.4rem;
            font-weight: 600;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ffffff 0%, #b0c8ff 80%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 40px rgba(80, 140, 255, 0.15);
            display: inline-block;
            padding: 0 20px;
        }

        /* ===== 搜索框 ===== */
        .search-section {
            margin-bottom: 24px;
            display: flex;
            justify-content: center;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 60px;
            padding: 6px 6px 6px 24px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
            width: 100%;
            max-width: 540px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }

        .search-box:focus-within {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 12px 32px rgba(80, 100, 255, 0.08);
            background: rgba(255, 255, 255, 0.06);
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 0;
            font-size: 1rem;
            color: #ffffff;
            outline: none;
            letter-spacing: 0.3px;
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.35);
            font-weight: 300;
        }

        .search-box button {
            background: rgba(255, 255, 255, 0.04);
            border: none;
            border-left: 1px solid rgba(255, 255, 255, 0.06);
            padding: 12px 28px;
            border-radius: 60px;
            color: #d0ddff;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            backdrop-filter: blur(4px);
            white-space: nowrap;
        }

        .search-box button:hover {
            background: rgba(255, 255, 255, 0.10);
            color: #ffffff;
            box-shadow: 0 0 20px rgba(100, 160, 255, 0.08);
        }

        /* ===== B站链接 ===== */
        .bilibili-link {
            text-align: center;
            margin-bottom: 20px;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            position: relative;
            overflow: hidden;
        }

        .bilibili-link::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 40% 30%, rgba(255, 255, 255, 0.04) 0%, transparent 60%);
            pointer-events: none;
            transition: transform 0.4s ease;
        }

        .bilibili-link:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.10);
            box-shadow: 0 12px 28px rgba(80, 100, 255, 0.05);
        }

        .bilibili-link a {
            color: #c8d8ff;
            text-decoration: none;
            font-size: 1.05rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
            position: relative;
            z-index: 1;
        }

        .bilibili-link a:hover {
            color: #ffffff;
        }

        .bilibili-link a::before {
            content: '📺';
            font-size: 0.9rem;
            opacity: 0.8;
        }

        /* ===== 游戏入口 ===== */
        .game-entry {
            text-align: center;
            margin-top: 8px;
        }

        .game-btn {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            background: rgba(255, 215, 100, 0.02);
            padding: 18px 48px;
            border-radius: 80px;
            border: 1px solid rgba(255, 215, 100, 0.06);
            backdrop-filter: blur(8px);
            color: #ffe8b0;
            font-size: 1.4rem;
            font-weight: 500;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            text-decoration: none;
            transform: translateY(0);
            position: relative;
            overflow: hidden;
        }

        .game-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(255, 215, 100, 0.06) 0%, transparent 60%);
            pointer-events: none;
            transition: transform 0.4s ease;
        }

        .game-btn:hover {
            transform: translateY(-6px) scale(1.02);
            background: rgba(255, 215, 100, 0.06);
            border-color: rgba(255, 215, 100, 0.15);
            box-shadow: 0 20px 48px rgba(255, 200, 50, 0.06);
            color: #fff5d0;
        }

        .game-btn:active {
            transform: translateY(0px) scale(0.98);
        }

        .game-btn span {
            font-size: 1.8rem;
            line-height: 1;
            position: relative;
            z-index: 1;
        }

        /* ===== 工具卡片 ===== */
        .tool-card {
            position: relative;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border-radius: 24px;
            padding: 24px 28px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04), inset 0 1px 0 rgba(255, 255, 255, 0.04);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
            cursor: pointer;
            text-decoration: none;
            display: block;
            transform: translateY(0);
        }

        .tool-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -30%;
            width: 70%;
            height: 50%;
            background: radial-gradient(ellipse at 30% 20%, rgba(255, 255, 255, 0.05) 0%, transparent 70%);
            pointer-events: none;
            border-radius: 50%;
            transition: transform 0.5s ease;
        }

        .tool-card:hover {
            transform: translateY(-6px) scale(1.01);
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 48px rgba(0, 0, 0, 0.06), inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }

        .tool-card:hover::before {
            transform: translate(5%, 3%);
        }

        .tool-card:active {
            transform: translateY(0px) scale(0.98);
        }

        .tool-card>* {
            position: relative;
            z-index: 1;
        }

        .tool-card .tool-title {
            color: #f0f4ff;
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .tool-card .tool-desc {
            color: rgba(255, 255, 255, 0.45);
            font-size: 0.95rem;
            font-weight: 300;
            line-height: 1.5;
            margin-bottom: 10px;
        }

        .tool-card .tool-link {
            color: rgba(160, 180, 255, 0.40);
            font-size: 0.8rem;
            font-family: monospace;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .tool-card:hover .tool-link {
            color: rgba(160, 180, 255, 0.60);
        }

        .tool-card .tool-link::before {
            content: '🔗';
            font-size: 0.7rem;
        }

        .no-result {
            color: rgba(255, 255, 255, 0.20);
            text-align: center;
            padding: 40px 20px;
            font-size: 1rem;
            letter-spacing: 1px;
            background: rgba(255, 255, 255, 0.01);
            border-radius: 24px;
            border: 1px dashed rgba(255, 255, 255, 0.04);
        }

        /* ===== 搜索结果区域 ===== */
        .results-area {
            display: none;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            margin-top: 8px;
            animation: fadeIn 0.3s ease;
        }

        .results-area.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .results-count {
            color: rgba(255, 255, 255, 0.30);
            font-size: 0.9rem;
            padding-left: 8px;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .results-count strong {
            color: #f0f4ff;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 600px) {
            body {
                padding: 20px 12px;
            }
            .card {
                padding: 28px 18px 30px;
                border-radius: 36px;
            }
            .card .glass-edge {
                border-radius: 36px;
            }
            .card::after {
                border-radius: 0 0 36px 36px;
            }
            .repo-title h1 {
                font-size: 1.6rem;
            }
            .search-box {
                flex-wrap: wrap;
                padding: 8px;
                border-radius: 40px;
            }
            .search-box input {
                width: 100%;
                padding: 14px 18px;
                font-size: 0.95rem;
                text-align: center;
            }
            .search-box button {
                width: 100%;
                border-left: none;
                border-top: 1px solid rgba(255, 255, 255, 0.06);
                padding: 14px;
                border-radius: 40px;
            }
            .game-btn {
                padding: 14px 28px;
                font-size: 1.2rem;
                width: 100%;
                justify-content: center;
            }
            .tool-card {
                padding: 18px 18px;
            }
            .tool-card .tool-title {
                font-size: 1.05rem;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 星空背景 ===== -->
    <canvas id="starfield"></canvas>

    <div class="main-wrapper">
        <!-- ===== 主卡片 ===== -->
        <div class="card">
            <div class="glass-edge"></div>

            <div class="repo-title">
                <h1>⚙️ Microsoft-DOS 的附件仓库</h1>
            </div>

            <!-- 搜索框 -->
            <div class="search-section">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="🔍 搜索工具名称或介绍..." aria-label="搜索仓库内容">
                    <button id="searchBtn">搜索</button>
                </div>
            </div>

            <!-- B站链接 -->
            <div class="bilibili-link">
                <a href="https://space.bilibili.com/3706992560441419?spm_id_from=333.1007.0.0" target="_blank" rel="noopener noreferrer">
                    Bilibili首页
                </a>
            </div>

            <!-- 游戏入口 -->
            <div class="game-entry">
                <a href="https://microsoft-dos.github.io/game" class="game-btn" target="_blank">
                    <span>🎮</span> 休闲小游戏
                </a>
            </div>
        </div>

        <!-- ===== 搜索结果 ===== -->
        <div class="results-area" id="resultsArea">
            <div class="results-count" id="resultsCount"></div>
            <div id="resultsList"></div>
        </div>
    </div>

    <!-- ============================================================
    高级感组件：加速球遮罩、校验倒计时、技术日志
    这些组件默认隐藏，由 JavaScript 触发显示
    ============================================================ -->

    <!-- 1. 加速球遮罩（资源调配动画） -->
    <div id="acceleratorOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(10,10,30,0.85); backdrop-filter:blur(12px); z-index:9999; display:none; justify-content:center; align-items:center; flex-direction:column;">
        <div style="background:rgba(255,255,255,0.04); border-radius:40px; padding:50px 60px; border:1px solid rgba(255,255,255,0.06); max-width:440px; width:90%; text-align:center; box-shadow:0 30px 80px rgba(0,0,0,0.6);">
            <div style="font-size:3.5rem; margin-bottom:16px;">🚀</div>
            <div id="acceleratorStatus" style="color:#f0f4ff; font-size:1.3rem; font-weight:300; letter-spacing:1px; margin-bottom:20px;">正在为您分配最优下载节点...</div>
            <!-- 进度条 -->
            <div style="width:100%; height:4px; background:rgba(255,255,255,0.06); border-radius:4px; overflow:hidden; margin-bottom:24px;">
                <div id="acceleratorProgress" style="width:0%; height:100%; background:linear-gradient(90deg, #6688ff, #a78bfa); border-radius:4px; transition:width 0.1s linear;"></div>
            </div>
            <!-- 加速球按钮（初始隐藏，进度完成后显示） -->
            <button id="acceleratorBtn" style="display:none; background:linear-gradient(135deg, rgba(102,136,255,0.15), rgba(167,139,250,0.15)); border:1px solid rgba(255,255,255,0.10); padding:14px 40px; border-radius:60px; color:#ffffff; font-size:1.1rem; font-weight:500; cursor:pointer; transition:all 0.3s ease; letter-spacing:1px;" onmouseover="this.style.background='linear-gradient(135deg, rgba(102,136,255,0.25), rgba(167,139,250,0.25))'" onmouseout="this.style.background='linear-gradient(135deg, rgba(102,136,255,0.15), rgba(167,139,250,0.15))'">
                ⚡ 极速安全通道
            </button>
            <div style="margin-top:16px; color:rgba(255,255,255,0.20); font-size:0.7rem; letter-spacing:0.5px;">节点优选完成 · 加密隧道已建立</div>
        </div>
    </div>

    <!-- 2. 校验倒计时对话框 -->
    <div id="verifyOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(10,10,30,0.75); backdrop-filter:blur(8px); z-index:10000; justify-content:center; align-items:center;">
        <div style="background:rgba(255,255,255,0.04); border-radius:32px; padding:40px 50px; border:1px solid rgba(255,255,255,0.06); max-width:380px; width:90%; text-align:center; box-shadow:0 30px 80px rgba(0,0,0,0.5);">
            <div style="font-size:2.8rem; margin-bottom:12px;">🔒</div>
            <div style="color:#f0f4ff; font-size:1.2rem; font-weight:400; letter-spacing:0.5px; margin-bottom:8px;">安全校验中</div>
            <div style="color:rgba(255,255,255,0.30); font-size:0.9rem; margin-bottom:20px;">检测文件完整性...</div>
            <div style="font-size:3rem; font-weight:200; color:#a78bfa; letter-spacing:2px;" id="verifyCountdown">3</div>
        </div>
    </div>

    <!-- 3. 技术日志区域（页面底部） -->
    <div id="techLog" style="position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:9998; max-width:600px; width:90%; background:rgba(255,255,255,0.02); backdrop-filter:blur(12px); border-radius:16px; padding:12px 20px; border:1px solid rgba(255,255,255,0.04); box-shadow:0 8px 32px rgba(0,0,0,0.3); transition:all 0.4s ease; opacity:0.8; cursor:pointer;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.8'">
        <div style="display:flex; align-items:center; gap:10px; color:rgba(255,255,255,0.15); font-size:0.65rem; font-family:monospace; letter-spacing:0.3px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;">
            <span style="color:rgba(102,136,255,0.4);">[系统]</span>
            <span id="logText">就绪 · 等待资源请求</span>
        </div>
    </div>


    <script>
        // ============================================================
        //  1. 工具数据
        // ============================================================
        const TOOLS = [
            { id: 'kyos', title: 'KylinOS.iso', desc: '银河麒麟系统镜像下载，适用于自主可控的桌面与服务器环境。', link: 'https://microsoft-dos.github.io/kyos' },
            { id: 'wi10', title: 'Windows 10 22H2.iso', desc: '微软官方 Windows 10 22H2 版本系统镜像，适用于纯净安装或系统修复。', link: 'https://microsoft-dos.github.io/wi10' },
            { id: 'zuby', title: '资源编译器', desc: '一款用于编译和打包资源文件的工具，适合开发者在项目中管理和优化资源。', link: 'https://microsoft-dos.github.io/zuby' },
            { id: 'dabaicai', title: 'DaBaiCai.iso', desc: '大白菜系统镜像，一款轻量级、易用的操作系统镜像文件。', link: 'https://microsoft-dos.github.io/dabaicai' },
            { id: 'dg', title: '分区工具 (DG)', desc: '一款专业的磁盘分区管理工具，支持分区调整、格式化、数据恢复等高级功能。', link: 'https://microsoft-dos.github.io/dg' },
            { id: 'wi11', title: 'Windows 11 25H2.iso', desc: '微软官方 Windows 11 25H2 版本（商业版）系统镜像。', link: 'https://microsoft-dos.github.io/wi11' }
        ];

        // ============================================================
        //  2. DOM 引用
        // ============================================================
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultsArea = document.getElementById('resultsArea');
        const resultsCount = document.getElementById('resultsCount');
        const resultsList = document.getElementById('resultsList');

        // ============================================================
        //  3. 搜索逻辑
        // ============================================================
        function performSearch() {
            const keyword = searchInput.value.trim().toLowerCase();

            if (keyword === '') {
                resultsArea.classList.remove('active');
                return;
            }

            if (keyword === '*' || keyword === '＊') {
                renderResults(TOOLS, '全部工具');
                return;
            }

            const matched = TOOLS.filter(tool =>
                tool.title.toLowerCase().includes(keyword) ||
                tool.desc.toLowerCase().includes(keyword)
            );

            renderResults(matched, keyword);
        }

        // ============================================================
        //  4. 渲染结果
        // ============================================================
        function renderResults(tools, keyword) {
            resultsList.innerHTML = '';

            if (tools.length === 0) {
                resultsCount.innerHTML = `🔍 未找到与 "<strong>${keyword}</strong>" 相关的工具`;
                resultsList.innerHTML = `<div class="no-result">😕 暂无匹配的工具，试试其他关键词吧</div>`;
                resultsArea.classList.add('active');
                return;
            }

            resultsCount.innerHTML = `📦 找到 <strong>${tools.length}</strong> 个匹配工具`;

            tools.forEach(tool => {
                const titleHighlight = highlightText(tool.title, keyword);
                const descHighlight = highlightText(tool.desc, keyword);

                const card = document.createElement('a');
                card.className = 'tool-card';
                card.href = tool.link;
                card.target = '_blank';
                card.innerHTML = `
                        <div class="tool-title">${titleHighlight}</div>
                        <div class="tool-desc">${descHighlight}</div>
                        <div class="tool-link">${tool.link}</div>
                    `;
                resultsList.appendChild(card);
            });

            resultsArea.classList.add('active');
        }

        // ============================================================
        //  5. 高亮辅助
        // ============================================================
        function highlightText(text, keyword) {
            if (keyword === '全部工具') return text;
            const regex = new RegExp(`(${keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return text.replace(regex, (match) =>
                `<span style="background:#facc15;color:#1a1f33;padding:0 4px;border-radius:3px;font-weight:600;">${match}</span>`
            );
        }

        // ============================================================
        //  6. 事件绑定
        // ============================================================
        searchBtn.addEventListener('click', performSearch);

        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                performSearch();
            }
        });

        // ============================================================
        //  7. 快捷键：/ 聚焦搜索框
        // ============================================================
        document.addEventListener('keydown', (e) => {
            if (e.key === '/' && !['INPUT', 'TEXTAREA'].includes(e.target.tagName)) {
                e.preventDefault();
                searchInput.focus();
            }
        });

        // ============================================================
        //  8. 高级感组件：加速球 + 校验倒计时 + 技术日志
        // ============================================================

        // --- 8a. 加速球 ---
        const acceleratorOverlay = document.getElementById('acceleratorOverlay');
        const acceleratorStatus = document.getElementById('acceleratorStatus');
        const acceleratorProgress = document.getElementById('acceleratorProgress');
        const acceleratorBtn = document.getElementById('acceleratorBtn');

        // 暴露到全局，供详情页调用
        window.showAccelerator = function(downloadUrl) {
            // 重置状态
            acceleratorOverlay.style.display = 'flex';
            acceleratorStatus.textContent = '🔄 正在为您分配最优下载节点...';
            acceleratorProgress.style.width = '0%';
            acceleratorBtn.style.display = 'none';

            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 6 + 2;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    // 完成
                    acceleratorStatus.textContent = '✅ 节点优选完成 · 加密隧道已建立';
                    acceleratorBtn.style.display = 'inline-block';
                    // 绑定跳转
                    acceleratorBtn.onclick = function() {
                        // 先显示校验倒计时
                        showVerifyCountdown(downloadUrl);
                        acceleratorOverlay.style.display = 'none';
                    };
                }
                acceleratorProgress.style.width = progress + '%';
            }, 80);

            // 技术日志同步更新
            updateLog('节点优选完成 (CDN: 边缘加速)');
            setTimeout(() => updateLog('正在建立加密隧道...'), 600);
            setTimeout(() => updateLog('资源定位成功，准备交付'), 1200);
        };

        // 关闭加速球（点击外部可关闭，但一般不需要）
        acceleratorOverlay.addEventListener('click', function(e) {
            if (e.target === this) {
                this.style.display = 'none';
            }
        });

        // --- 8b. 校验倒计时 ---
        const verifyOverlay = document.getElementById('verifyOverlay');
        const verifyCountdown = document.getElementById('verifyCountdown');

        function showVerifyCountdown(downloadUrl) {
            verifyOverlay.style.display = 'flex';
            let count = 3;
            verifyCountdown.textContent = count;

            const timer = setInterval(() => {
                count--;
                if (count <= 0) {
                    clearInterval(timer);
                    verifyOverlay.style.display = 'none';
                    // 最终跳转
                    window.location.href = downloadUrl;
                    updateLog('✅ 资源交付完成，跳转至网盘');
                } else {
                    verifyCountdown.textContent = count;
                    updateLog(`🔒 安全校验中: 检测文件完整性... ${count}s`);
                }
            }, 1000);
        }

        // --- 8c. 技术日志 ---
        const logText = document.getElementById('logText');

        function updateLog(message) {
            const timestamp = new Date().toLocaleTimeString('zh-CN', { hour12: false });
            logText.textContent = `[${timestamp}] ${message}`;
        }

        // 页面加载后显示一条初始日志
        updateLog('系统就绪 · 等待资源请求');

        // 暴露日志函数到全局
        window.updateLog = updateLog;

        // ============================================================
        //  9. 动态星空背景
        // ============================================================
        const canvas = document.getElementById('starfield');
        const ctx2 = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const stars = [];
        const NUM_STARS = 120;
        for (let i = 0; i < NUM_STARS; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 1.8 + 0.5,
                speed: 0.005 + Math.random() * 0.02,
                phase: Math.random() * Math.PI * 2,
            });
        }

        function drawStars(time) {
            ctx2.clearRect(0, 0, canvas.width, canvas.height);
            for (const star of stars) {
                const brightness = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(time * star.speed + star.phase));
                ctx2.beginPath();
                ctx2.arc(star.x, star.y, star.radius, 0, 2 * Math.PI);
                ctx2.fillStyle = `rgba(255, 255, 255, ${brightness * 0.6})`;
                ctx2.fill();
            }
            requestAnimationFrame(drawStars);
        }
        drawStars(0);
    </script>

</body>
</html>
