<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

        .detail-card .desc { color: rgba(255,255,255,0.55); font-size: 1.05rem; line-height: 1.6; margin-bottom: 20px; }
        .detail-card .meta { color: rgba(255,255,255,0.25); font-size: 0.85rem; margin-bottom: 24px; font-family: monospace; }
        .detail-card .meta span { display: inline-block; margin-right: 20px; }
        .detail-card .btn-group { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; }
        .detail-card .btn-primary {
            background: linear-gradient(135deg, rgba(102,136,255,0.12), rgba(167,139,250,0.12));

            padding: 16px 40px;
            border-radius: 60px;
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            flex: 1;
            min-width: 180px;
            text-align: center;
            text-decoration: none;
        }
        .detail-card .btn-primary:hover {
            background: linear-gradient(135deg, rgba(102,136,255,0.22), rgba(167,139,250,0.22));
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(102,136,255,0.10);
        }
        .detail-card .btn-secondary {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.04);
            padding: 16px 28px;
            border-radius: 60px;
            color: rgba(255,255,255,0.45);
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            text-align: center;
            flex: 1;
            min-width: 140px;
        }
        .detail-card .btn-secondary:hover {
            background: rgba(255,255,255,0.04);
            color: #ffffff;
            border-color: rgba(255,255,255,0.08);
        }
        .detail-card .cloud-note {
            color: rgba(255,255,255,0.15);
            font-size: 0.7rem;
            letter-spacing: 0.5px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.03);
        }
        .detail-card .back-link {
            display: inline-block;
            margin-top: 20px;
            color: rgba(255,255,255,0.20);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }
        .detail-card .back-link:hover { color: rgba(255,255,255,0.50); }
        @media (max-width: 500px) {
            .detail-card { padding: 28px 18px; }
            .detail-card h1 { font-size: 1.5rem; }
            .detail-card .btn-primary { min-width: 100%; }
            .detail-card .btn-secondary { min-width: 100%; }
        }

        #acceleratorOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10,10,30,0.85);
            backdrop-filter: blur(12px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        #acceleratorOverlay .box {
            background: rgba(255,255,255,0.04);
            border-radius: 40px;
            padding: 50px 60px;
            border: 1px solid rgba(255,255,255,0.06);
            max-width: 440px; width: 90%;
            text-align: center;
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
        }
        #acceleratorOverlay .box .icon { font-size: 3.5rem; margin-bottom: 16px; }
        #acceleratorOverlay .box .status { color: #f0f4ff; font-size: 1.3rem; font-weight: 300; letter-spacing: 1px; margin-bottom: 20px; }
        #acceleratorOverlay .box .progress-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; margin-bottom: 24px; }
        #acceleratorOverlay .box .progress-bar .fill { width: 0%; height: 100%; background: linear-gradient(90deg, #6688ff, #a78bfa); border-radius: 4px; transition: width 0.1s linear; }
        #acceleratorOverlay .box .btn-go {
            display: none;
            background: linear-gradient(135deg, rgba(102,136,255,0.15), rgba(167,139,250,0.15));
            border: 1px solid rgba(255,255,255,0.10);
            padding: 14px 40px;
            border-radius: 60px;
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }
        #acceleratorOverlay .box .btn-go:hover {
            background: linear-gradient(135deg, rgba(102,136,255,0.25), rgba(167,139,250,0.25));
        }
        #acceleratorOverlay .box .note { margin-top: 16px; color: rgba(255,255,255,0.20); font-size: 0.7rem; letter-spacing: 0.5px; }

        #verifyOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10,10,30,0.75);
            backdrop-filter: blur(8px);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        #verifyOverlay .box {
            background: rgba(255,255,255,0.04);
            border-radius: 32px;
            padding: 40px 50px;
            border: 1px solid rgba(255,255,255,0.06);
            max-width: 380px; width: 90%;
            text-align: center;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
        }
        #verifyOverlay .box .icon { font-size: 2.8rem; margin-bottom: 12px; }
        #verifyOverlay .box .title { color: #f0f4ff; font-size: 1.2rem; font-weight: 400; letter-spacing: 0.5px; margin-bottom: 8px; }
        #verifyOverlay .box .sub { color: rgba(255,255,255,0.30); font-size: 0.9rem; margin-bottom: 20px; }
        #verifyOverlay .box .count { font-size: 3rem; font-weight: 200; color: #a78bfa; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="detail-card">
        <div class="icon">🐧</div>
        <h1 id="toolName">KylinOS.iso</h1>
        <p class="desc" id="toolDesc">银河麒麟系统镜像下载，适用于自主可控的桌面与服务器环境。</p>
        <div class="meta">
            <span>📦 大小：<strong id="toolSize">约 4.2 GB</strong></span>
            <span>🔑 MD5：<strong id="toolMd5">9b5f0a1f63ff3709bdd03b1130a44d32</strong></span>
                </div>
        <div class="btn-group">
            <a href="javascript:void(0);" class="btn-primary" id="downloadBtn">⚡ 获取资源</a>
            <a href="#" class="btn-secondary" target="_blank">📦 备用方案</a>
        </div>
        <div style="color:rgba(255,255,255,0.25); font-size:0.75rem; letter-spacing:0.5px; margin-top:4px; margin-bottom:8px;">
            🔑 提取码：<strong style="color:rgba(255,255,255,0.45);">kyos</strong>
        </div>
        <div class="cloud-note">📦 资源由第三方云盘托管 · 安全交付</div>
        <a href="https://microsoft-dos.github.io" class="back-link">← 返回仓库首页</a>
    </div>

    <div id="acceleratorOverlay">
        <div class="box">
            <div class="icon">🚀</div>
            <div class="status" id="acceleratorStatus">正在为您分配最优下载节点...</div>
            <div class="progress-bar"><div class="fill" id="acceleratorProgress"></div></div>
            <button class="btn-go" id="acceleratorBtn">⚡ 极速安全通道</button>
            <div class="note">节点优选完成 · 加密隧道已建立</div>
        </div>
    </div>

    <div id="verifyOverlay">
        <div class="box">
            <div class="icon">🔒</div>
            <div class="title">安全校验中</div>
            <div class="sub">检测文件完整性...</div>
            <div class="count" id="verifyCountdown">3</div>
        </div>
    </div>

    <script>
        const toolName = document.getElementById('toolName').textContent;
        const downloadUrl = 'https://1858240872.share.123pan.cn/123pan/VJjlvd-1Xg3d?notoken=1';

        const acceleratorOverlay = document.getElementById('acceleratorOverlay');
        const acceleratorStatus = document.getElementById('acceleratorStatus');
        const acceleratorProgress = document.getElementById('acceleratorProgress');
        const acceleratorBtn = document.getElementById('acceleratorBtn');
        const verifyOverlay = document.getElementById('verifyOverlay');
        const verifyCountdown = document.getElementById('verifyCountdown');

        function showAccelerator() {
            acceleratorOverlay.style.display = 'flex';
            acceleratorStatus.textContent = '🔄 正在为您分配最优下载节点...';
            acceleratorProgress.style.width = '0%';
            acceleratorBtn.style.display = 'none';

            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 6 + 2;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    acceleratorStatus.textContent = '✅ 节点优选完成 · 加密隧道已建立';
                    acceleratorBtn.style.display = 'inline-block';
                }
                acceleratorProgress.style.width = progress + '%';
            }, 80);
        }

        function showVerifyCountdown() {
            verifyOverlay.style.display = 'flex';
            let count = 3;
            verifyCountdown.textContent = count;
            const timer = setInterval(() => {
                count--;
                if (count <= 0) {
                    clearInterval(timer);
                    verifyOverlay.style.display = 'none';
                    window.location.href = downloadUrl;
                } else {
                    verifyCountdown.textContent = count;
                }
            }, 1000);
        }

        acceleratorBtn.addEventListener('click', function() {
            acceleratorOverlay.style.display = 'none';
            showVerifyCountdown();
        });

        document.getElementById('downloadBtn').addEventListener('click', function(e) {
            e.preventDefault();
            showAccelerator();
        });

        acceleratorOverlay.addEventListener('click', function(e) {
            if (e.target === this) this.style.display = 'none';
        });
        verifyOverlay.addEventListener('click', function(e) {
            if (e.target === this) this.style.display = 'none';
        });
    </script>
</body>
</html>
