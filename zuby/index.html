<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资源编译器 - MS-DOS 极客资源库</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0b0d15;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        .bg-orb {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #f093fb, #f5576c, #4facfe);
            filter: blur(80px);
            opacity: 0.4;
            animation: orbMove 12s ease-in-out infinite alternate;
            z-index: 0;
        }
        .bg-orb:nth-child(2) {
            width: 400px;
            height: 400px;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 70% 70%, #43e97b, #38f9d7);
            animation-duration: 18s;
            animation-delay: -4s;
            opacity: 0.25;
        }
        @keyframes orbMove {
            0% { transform: translate(-100px, -80px) scale(1); }
            100% { transform: translate(120px, 100px) scale(1.3); }
        }
        .detail-card {
            position: relative;
            z-index: 1;
            max-width: 720px;
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 48px;
            padding: 48px 40px;
            border: 1px solid rgba(0, 242, 255, 0.06);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(0, 242, 255, 0.04);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .detail-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(0, 242, 255, 0.08);
        }
        .detail-card .icon { font-size: 3.5rem; margin-bottom: 12px; }
        .detail-card h1 {
            color: #f0f4ff;
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 8px;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
        }
        .detail-card .desc {
            color: rgba(255, 255, 255, 0.45);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 20px;
            font-weight: 300;
        }
        .detail-card .meta {
            color: rgba(255, 255, 255, 0.20);
            font-size: 0.8rem;
            margin-bottom: 24px;
            font-family: 'Courier New', monospace;
        }
        .detail-card .meta span { display: inline-block; margin-right: 20px; }
        .detail-card .meta strong { color: rgba(0, 242, 255, 0.60); font-weight: 400; }
        .detail-card .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 4px;
        }
        .detail-card .btn-primary {
            background: rgba(0, 242, 255, 0.04);
            border: 1px solid rgba(0, 242, 255, 0.10);
            padding: 16px 40px;
            border-radius: 60px;
            color: #00f2ff;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            flex: 1;
            min-width: 180px;
            text-align: center;
            text-decoration: none;
            font-family: 'Courier New', monospace;
        }
        .detail-card .btn-primary:hover {
            background: rgba(0, 242, 255, 0.08);
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0, 242, 255, 0.06);
            color: #ffffff;
        }
        .detail-card .btn-secondary {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 16px 28px;
            border-radius: 60px;
            color: rgba(255, 255, 255, 0.30);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            text-align: center;
            flex: 1;
            min-width: 140px;
            font-family: 'Courier New', monospace;
        }
        .detail-card .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.60);
            border-color: rgba(255, 255, 255, 0.08);
        }
        .detail-card .extract-code {
            color: rgba(255, 255, 255, 0.18);
            font-size: 0.7rem;
            letter-spacing: 0.5px;
            margin-top: 4px;
            margin-bottom: 8px;
            font-family: 'Courier New', monospace;
        }
        .detail-card .extract-code strong {
            color: rgba(0, 242, 255, 0.40);
            font-weight: 400;
        }
        .detail-card .cloud-note {
            color: rgba(255, 255, 255, 0.10);
            font-size: 0.6rem;
            letter-spacing: 1px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            font-family: 'Courier New', monospace;
        }
        .detail-card .back-link {
            display: inline-block;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.15);
            text-decoration: none;
            font-size: 0.8rem;
            transition: color 0.2s;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.5px;
        }
        .detail-card .back-link:hover { color: rgba(0, 242, 255, 0.40); }
        #acceleratorOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 30, 0.88);
            backdrop-filter: blur(16px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        #acceleratorOverlay .box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 40px;
            padding: 50px 60px;
            border: 1px solid rgba(0, 242, 255, 0.06);
            max-width: 440px; width: 90%;
            text-align: center;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
        }
        #acceleratorOverlay .box .icon { font-size: 3.5rem; margin-bottom: 16px; }
        #acceleratorOverlay .box .status {
            color: #f0f4ff;
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 1px;
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
        }
        #acceleratorOverlay .box .progress-bar {
            width: 100%; height: 3px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 24px;
        }
        #acceleratorOverlay .box .progress-bar .fill {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, #00f2ff, #a78bfa);
            border-radius: 4px;
            transition: width 0.1s linear;
        }
        #acceleratorOverlay .box .btn-go {
            display: none;
            background: rgba(0, 242, 255, 0.06);
            border: 1px solid rgba(0, 242, 255, 0.12);
            padding: 14px 40px;
            border-radius: 60px;
            color: #00f2ff;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            font-family: 'Courier New', monospace;
        }
        #acceleratorOverlay .box .btn-go:hover {
            background: rgba(0, 242, 255, 0.12);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.06);
            color: #ffffff;
        }
        #acceleratorOverlay .box .note {
            margin-top: 16px;
            color: rgba(255, 255, 255, 0.10);
            font-size: 0.6rem;
            letter-spacing: 0.5px;
            font-family: 'Courier New', monospace;
        }
        #verifyOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 30, 0.78);
            backdrop-filter: blur(10px);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        #verifyOverlay .box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 32px;
            padding: 40px 50px;
            border: 1px solid rgba(0, 242, 255, 0.04);
            max-width: 380px; width: 90%;
            text-align: center;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
        }
        #verifyOverlay .box .icon { font-size: 2.8rem; margin-bottom: 12px; }
        #verifyOverlay .box .title {
            color: #f0f4ff;
            font-size: 1.1rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            font-family: 'Courier New', monospace;
        }
        #verifyOverlay .box .sub {
            color: rgba(255, 255, 255, 0.18);
            font-size: 0.85rem;
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
        }
        #verifyOverlay .box .count {
            font-size: 3rem;
            font-weight: 200;
            color: #00f2ff;
            letter-spacing: 2px;
            font-family: 'Courier New', monospace;
        }
        @media (max-width: 500px) {
            .detail-card { padding: 28px 18px; border-radius: 32px; }
            .detail-card h1 { font-size: 1.5rem; }
            .detail-card .btn-primary { min-width: 100%; }
            .detail-card .btn-secondary { min-width: 100%; }
            #acceleratorOverlay .box { padding: 30px 24px; }
            #verifyOverlay .box { padding: 30px 24px; }
        }
    </style>
</head>
<body>
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>

    <div class="detail-card">
        <div class="icon">⚙️</div>
        <h1>资源编译器</h1>
        <p class="desc">一款用于编译和打包资源文件的工具（ResourceHacker），适合开发者在项目中管理和优化资源。</p>
        <div class="meta">
            <span>📦 大小：<strong>约 1.5 MB</strong></span>
            <span>🔑 MD5：<strong>d8440bc5507c119b5a7d90f9ca0a263e</strong></span>
        </div>
        <div class="btn-group">
            <a href="javascript:void(0);" class="btn-primary" id="downloadBtn">⚡ 获取资源</a>
            <a href="#" class="btn-secondary" target="_blank">📦 备用方案</a>
        </div>
        <div class="extract-code">🔑 提取码：<strong>xput</strong></div>
        <div class="cloud-note">📦 资源由第三方云盘托管 · 安全交付</div>
        <a href="https://microsoft-dos.github.io" class="back-link">← 返回仓库首页</a>
    </div>

    <div id="acceleratorOverlay">
        <div class="box">
            <div class="icon">🚀</div>
            <div class="status" id="acceleratorStatus">正在分配最优节点...</div>
            <div class="progress-bar"><div class="fill" id="acceleratorProgress"></div></div>
            <button class="btn-go" id="acceleratorBtn">⚡ 极速通道</button>
            <div class="note">NODE OPTIMIZED · TUNNEL ESTABLISHED</div>
        </div>
    </div>

    <div id="verifyOverlay">
        <div class="box">
            <div class="icon">🔒</div>
            <div class="title">安全校验中</div>
            <div class="sub">验证文件完整性...</div>
            <div class="count" id="verifyCountdown">3</div>
        </div>
    </div>

    <script>
        const downloadUrl = 'https://pan.baidu.com/s/1OvMloC6wSYECFOgSVVoCDQ?pwd=xput';
        const acceleratorOverlay = document.getElementById('acceleratorOverlay');
        const acceleratorStatus = document.getElementById('acceleratorStatus');
        const acceleratorProgress = document.getElementById('acceleratorProgress');
        const acceleratorBtn = document.getElementById('acceleratorBtn');
        const verifyOverlay = document.getElementById('verifyOverlay');
        const verifyCountdown = document.getElementById('verifyCountdown');

        function showAccelerator() {
            acceleratorOverlay.style.display = 'flex';
            acceleratorStatus.textContent = '🔄 正在分配最优节点...';
            acceleratorProgress.style.width = '0%';
            acceleratorBtn.style.display = 'none';
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 6 + 2;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    acceleratorStatus.textContent = '✅ 节点优选完成 · 隧道已建立';
                    acceleratorBtn.style.display = 'inline-block';
                }
                acceleratorProgress.style.width = progress + '%';
            }, 80);
        }

        function showVerifyCountdown() {
            verifyOverlay.style.display = 'flex';
            let count = 3;
            verifyCountdown.textContent = count;
            const timer = setInterval(() => {
                count--;
                if (count <= 0) {
                    clearInterval(timer);
                    verifyOverlay.style.display = 'none';
                    window.location.href = downloadUrl;
                } else {
                    verifyCountdown.textContent = count;
                }
            }, 1000);
        }

        acceleratorBtn.addEventListener('click', function() {
            acceleratorOverlay.style.display = 'none';
            showVerifyCountdown();
        });

        document.getElementById('downloadBtn').addEventListener('click', function(e) {
            e.preventDefault();
            showAccelerator();
        });

        acceleratorOverlay.addEventListener('click', function(e) {
            if (e.target === this) this.style.display = 'none';
        });
        verifyOverlay.addEventListener('click', function(e) {
            if (e.target === this) this.style.display = 'none';
        });
    </script>
</body>
</html>
