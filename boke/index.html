<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microsoft-DOS 的博客</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background: #0b0d15;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }
        .bg-orb {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #f093fb, #f5576c, #4facfe);
            filter: blur(80px);
            opacity: 0.35;
            animation: orbMove 12s ease-in-out infinite alternate;
            z-index: 0;
        }
        .bg-orb:nth-child(2) {
            width: 400px;
            height: 400px;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 70% 70%, #43e97b, #38f9d7);
            animation-duration: 18s;
            animation-delay: -4s;
            opacity: 0.2;
        }
        @keyframes orbMove {
            0% { transform: translate(-100px, -80px) scale(1); }
            100% { transform: translate(120px, 100px) scale(1.3); }
        }
        .main-wrapper {
            position: relative;
            z-index: 1;
            max-width: 860px;
            width: 100%;
        }
        .cyber-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .cyber-header h1 {
            font-family: 'Courier New', monospace;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 4px;
            color: #00f2ff;
            text-shadow: 0 0 30px rgba(0, 242, 255, 0.15);
            background: rgba(255, 255, 255, 0.02);
            padding: 8px 20px;
            border-radius: 40px;
            border: 1px solid rgba(0, 242, 255, 0.08);
        }
        .cyber-header h1 span { color: #fff; opacity: 0.3; font-weight: 300; }
        .card {
            position: relative;
            overflow: hidden;
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 48px;
            padding: 40px 40px 36px;
            border: 1px solid rgba(0, 242, 255, 0.06);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(0, 242, 255, 0.04);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin-bottom: 30px;
        }
        .card::before {
            content: '';
            position: absolute;
            top: -40%;
            left: -20%;
            width: 70%;
            height: 50%;
            background: radial-gradient(ellipse at 30% 20%, rgba(0, 242, 255, 0.06) 0%, transparent 70%);
            pointer-events: none;
            border-radius: 50%;
            transition: transform 0.5s ease;
        }
        .card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 5%;
            right: 5%;
            height: 30%;
            background: linear-gradient(to top, rgba(0, 242, 255, 0.03) 0%, transparent 100%);
            pointer-events: none;
            border-radius: 0 0 48px 48px;
        }
        .card .glass-edge {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 48px;
            pointer-events: none;
            background: linear-gradient(135deg, rgba(0, 242, 255, 0.04) 0%, transparent 30%, transparent 70%, rgba(0, 242, 255, 0.02) 100%);
            z-index: 0;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(0, 242, 255, 0.08);
        }
        .card>*:not(.glass-edge) { position: relative; z-index: 1; }

        .search-section {
            margin-bottom: 24px;
            display: flex;
            justify-content: center;
        }
        .search-box {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 60px;
            padding: 6px 6px 6px 24px;
            border: 1px solid rgba(0, 242, 255, 0.10);
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
            width: 100%;
            max-width: 540px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }
        .search-box:focus-within {
            transform: translateY(-2px);
            border-color: rgba(0, 242, 255, 0.30);
            box-shadow: 0 12px 32px rgba(0, 242, 255, 0.06);
            background: rgba(255, 255, 255, 0.05);
        }
        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 0;
            font-size: 1rem;
            color: #f0f4ff;
            outline: none;
            letter-spacing: 0.5px;
            font-family: 'Courier New', monospace;
        }
        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.20);
            font-weight: 300;
            letter-spacing: 1px;
        }
        .search-box button {
            background: rgba(0, 242, 255, 0.06);
            border: none;
            border-left: 1px solid rgba(0, 242, 255, 0.08);
            padding: 12px 28px;
            border-radius: 60px;
            color: #00f2ff;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            backdrop-filter: blur(4px);
            white-space: nowrap;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
        }
        .search-box button:hover {
            background: rgba(0, 242, 255, 0.12);
            color: #ffffff;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.08);
        }
        .results-count {
            color: rgba(255, 255, 255, 0.20);
            font-size: 0.8rem;
            padding-left: 8px;
            margin-bottom: 12px;
            letter-spacing: 1px;
            font-family: 'Courier New', monospace;
        }
        .results-count strong { color: #00f2ff; }

        #blogList {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        .blog-card {
            position: relative;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 22px 24px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
            cursor: pointer;
            text-decoration: none;
            display: block;
            transform: translateY(0);
        }
        .blog-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -30%;
            width: 70%;
            height: 50%;
            background: radial-gradient(ellipse at 30% 20%, rgba(0, 242, 255, 0.03) 0%, transparent 70%);
            pointer-events: none;
            border-radius: 50%;
            transition: transform 0.5s ease;
        }
        .blog-card:hover {
            transform: translateY(-6px) scale(1.01);
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(0, 242, 255, 0.15);
            box-shadow: 0 20px 48px rgba(0, 0, 0, 0.2), 0 0 30px rgba(0, 242, 255, 0.03);
        }
        .blog-card:hover::before { transform: translate(5%, 3%); }
        .blog-card>* { position: relative; z-index: 1; }
        .blog-card .blog-title {
            color: #f0f4ff;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            font-family: 'Courier New', monospace;
        }
        .blog-card .blog-desc {
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.9rem;
            font-weight: 300;
            line-height: 1.5;
            margin-bottom: 8px;
        }
        .blog-card .blog-meta {
            color: rgba(0, 242, 255, 0.30);
            font-size: 0.7rem;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .blog-card .blog-meta .tag {
            background: rgba(0, 242, 255, 0.06);
            padding: 2px 10px;
            border-radius: 12px;
            border: 1px solid rgba(0, 242, 255, 0.06);
        }
        .no-result {
            color: rgba(255, 255, 255, 0.15);
            text-align: center;
            padding: 40px 20px;
            font-size: 0.9rem;
            letter-spacing: 1px;
            font-family: 'Courier New', monospace;
            grid-column: 1 / -1;
        }
        .back-link {
            display: inline-block;
            margin-top: 24px;
            color: rgba(255, 255, 255, 0.12);
            text-decoration: none;
            font-size: 0.8rem;
            transition: color 0.2s;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.5px;
        }
        .back-link:hover { color: rgba(0, 242, 255, 0.30); }
        @media (max-width: 600px) {
            body { padding: 20px 12px; }
            .card { padding: 24px 16px 28px; border-radius: 32px; }
            .card .glass-edge { border-radius: 32px; }
            .card::after { border-radius: 0 0 32px 32px; }
            .cyber-header h1 { font-size: 1.2rem; letter-spacing: 2px; padding: 6px 14px; }
            .search-box { flex-wrap: wrap; padding: 8px; border-radius: 40px; }
            .search-box input { width: 100%; padding: 12px 16px; font-size: 0.9rem; text-align: center; }
            .search-box button { width: 100%; border-left: none; border-top: 1px solid rgba(0, 242, 255, 0.06); padding: 12px; border-radius: 40px; justify-content: center; }
            #blogList { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
    <div class="main-wrapper">
        <div class="cyber-header">
            <h1>📝 BLOG<span>_DOS</span></h1>
        </div>
        <div class="card">
            <div class="glass-edge"></div>
            <div class="search-section">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="> 搜索文章..." aria-label="搜索博客">
                    <button id="searchBtn">SEARCH</button>
                </div>
            </div>
            <div class="results-count" id="resultsCount">📦 共 <strong id="totalCount">0</strong> 篇文章</div>
            <div id="blogList"></div>
            <a href="https://microsoft-dos.github.io" class="back-link">← 返回仓库首页</a>
        </div>
    </div>
    <script>
        const BLOGS = [];
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const blogList = document.getElementById('blogList');
        const totalCount = document.getElementById('totalCount');
        const resultsCount = document.getElementById('resultsCount');

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function highlightText(text, keyword) {
            if (!keyword || keyword === '') return text;
            const regex = new RegExp(`(${keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return text.replace(regex, (match) =>
                `<span style="background:rgba(0,242,255,0.15);color:#00f2ff;padding:0 4px;border-radius:3px;font-weight:600;">${match}</span>`
            );
        }

        function renderBlogs(blogs, keyword = '') {
            blogList.innerHTML = '';
            if (blogs.length === 0) {
                blogList.innerHTML = `<div class="no-result">📝 暂无文章 · 等博主慢慢写</div>`;
                resultsCount.innerHTML = `📦 共 <strong>0</strong> 篇文章`;
                return;
            }
            totalCount.textContent = blogs.length;
            if (keyword && keyword !== '') {
                resultsCount.innerHTML = `🔍 找到 <strong>${blogs.length}</strong> 篇匹配的文章`;
            } else {
                resultsCount.innerHTML = `📦 共 <strong>${blogs.length}</strong> 篇文章 · 随机展示中`;
            }
            blogs.forEach(blog => {
                const titleHighlight = highlightText(blog.title, keyword);
                const descHighlight = highlightText(blog.desc, keyword);
                const card = document.createElement('a');
                card.className = 'blog-card';
                card.href = blog.link;
                card.target = '_blank';
                card.innerHTML = `
                    <div class="blog-title">${titleHighlight}</div>
                    <div class="blog-desc">${descHighlight}</div>
                    <div class="blog-meta">
                        <span class="tag">#${blog.tag}</span>
                        <span>${blog.link}</span>
                    </div>
                `;
                blogList.appendChild(card);
            });
        }

        function performSearch() {
            const keyword = searchInput.value.trim().toLowerCase();
            if (keyword === '') {
                const shuffled = shuffleArray([...BLOGS]);
                renderBlogs(shuffled.slice(0, 6), '');
                return;
            }
            const matched = BLOGS.filter(blog =>
                blog.title.toLowerCase().includes(keyword) ||
                blog.desc.toLowerCase().includes(keyword) ||
                blog.tag.toLowerCase().includes(keyword)
            );
            renderBlogs(matched, keyword);
        }

        searchBtn.addEventListener('click', performSearch);
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                performSearch();
            }
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === '/' && !['INPUT', 'TEXTAREA'].includes(e.target.tagName)) {
                e.preventDefault();
                searchInput.focus();
            }
        });
        const shuffled = shuffleArray([...BLOGS]);
        renderBlogs(shuffled.slice(0, 6), '');
    </script>
</body>
</html>
